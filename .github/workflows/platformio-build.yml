name: PlatformIO Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Build PaperS3Weather-Calendar firmware
        run: pio run -e PaperS3

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: PaperS3Weather-Calendar-firmware
          path: .pio/build/PaperS3/firmware.bin
          if-no-files-found: error

      - name: Publish firmware release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: firmware-${{ github.sha }}
          name: PaperS3Weather-Calendar firmware ${{ github.sha }}
          body: |
            Automated firmware build from main.

            Commit: ${{ github.sha }}
          files: .pio/build/PaperS3/firmware.bin

      - name: Keep only latest firmware release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const keepTag = `firmware-${context.sha}`;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            for (const release of releases) {
              if (!release.tag_name.startsWith('firmware-') || release.tag_name === keepTag) {
                continue;
              }

              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
              });

              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${release.tag_name}`,
                });
              } catch (error) {
                if (error.status !== 422 && error.status !== 404) {
                  throw error;
                }
              }
            }
