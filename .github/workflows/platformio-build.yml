name: PlatformIO Build

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Build PaperS3 firmware
        run: pio run -e PaperS3

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: PaperS3Weather-firmware
          path: .pio/build/PaperS3/firmware.bin
          if-no-files-found: error

      - name: Publish firmware release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: firmware-${{ github.sha }}
          name: PaperS3Weather firmware ${{ github.sha }}
          body: |
            Automated firmware build from main.

            Commit: ${{ github.sha }}
          files: .pio/build/PaperS3/firmware.bin
